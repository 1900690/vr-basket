<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Hoop Shoot | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/addons/",
          "@dimforge/rapier3d-simd-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-simd-compat@0.19.2/rapier.mjs"
        }
      }
    </script>
  </head>

  <body>
    <xr-app id="app"></xr-app>

    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import RAPIER from '@dimforge/rapier3d-simd-compat';

      class HoopGame extends xb.Script {
        constructor() {
          super();
          this.score = 0;
          this.balls = [];
          this.RAPIER = null;
          this.blendedWorld = null;
        }

        init() {
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(0, 5, 0);
          this.add(dirLight);

          const floorGeom = new THREE.PlaneGeometry(20, 20);
          floorGeom.rotateX(-Math.PI / 2);
          const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
          const floorMesh = new THREE.Mesh(floorGeom, floorMat);
          this.add(floorMesh);

          const torusGeom = new THREE.TorusGeometry(0.4, 0.04, 16, 32);
          torusGeom.rotateX(Math.PI / 2);
          const torusMat = new THREE.MeshPhongMaterial({ color: 0xff3300 });
          this.torusMesh = new THREE.Mesh(torusGeom, torusMat);
          this.torusMesh.position.set(0, 2.0, -2.5);
          this.add(this.torusMesh);

          const boardGeom = new THREE.BoxGeometry(1.6, 1.2, 0.1);
          const boardMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
          const boardMesh = new THREE.Mesh(boardGeom, boardMat);
          boardMesh.position.set(0, 2.5, -2.95);
          this.add(boardMesh);

          const poleGeom = new THREE.CylinderGeometry(0.05, 0.05, 3.0);
          const poleMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
          const poleMesh = new THREE.Mesh(poleGeom, poleMat);
          poleMesh.position.set(0, 1.5, -3.0);
          this.add(poleMesh);

          const panel = new xb.SpatialPanel({ width: 1.0, height: 0.5, backgroundColor: '#000000bb' });
          panel.position.set(0, 3.5, -2.9);
          this.add(panel);
          
          const grid = panel.addGrid();
          this.scoreText = grid.addRow().addText({ text: 'SCORE: 0', fontSize: 0.2, fontColor: '#00ff00' });
        }

        initPhysics(physics) {
          this.RAPIER = physics.RAPIER;
          this.blendedWorld = physics.blendedWorld;

          const floorDesc = this.RAPIER.RigidBodyDesc.fixed().setTranslation(0, 0, 0);
          const floorBody = this.blendedWorld.createRigidBody(floorDesc);
          const floorCol = this.RAPIER.ColliderDesc.cuboid(10, 0.05, 10).setRestitution(0.8);
          this.blendedWorld.createCollider(floorCol, floorBody);

          const torusGeom = new THREE.TorusGeometry(0.4, 0.04, 16, 32);
          torusGeom.rotateX(Math.PI / 2);
          const vertices = torusGeom.attributes.position.array;
          const indices = torusGeom.index.array;
          const ringDesc = this.RAPIER.RigidBodyDesc.fixed().setTranslation(0, 2.0, -2.5);
          const ringBody = this.blendedWorld.createRigidBody(ringDesc);
          const ringCol = this.RAPIER.ColliderDesc.trimesh(vertices, indices);
          this.blendedWorld.createCollider(ringCol, ringBody);

          const boardDesc = this.RAPIER.RigidBodyDesc.fixed().setTranslation(0, 2.5, -2.95);
          const boardBody = this.blendedWorld.createRigidBody(boardDesc);
          const boardCol = this.RAPIER.ColliderDesc.cuboid(0.8, 0.6, 0.05).setRestitution(0.6);
          this.blendedWorld.createCollider(boardCol, boardBody);
        }

        onSelectStart(event) {
          if (!this.RAPIER || !this.blendedWorld) return;
          const controller = event.target;
          const radius = 0.12; 
          const geom = new THREE.SphereGeometry(radius, 32, 32);
          const mat = new THREE.MeshPhongMaterial({ color: 0xff8800 });
          const mesh = new THREE.Mesh(geom, mat);
          
          const pos = new THREE.Vector3().copy(controller.position);
          mesh.position.copy(pos);
          this.add(mesh);

          const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(controller.quaternion);
          direction.y += 0.4; 
          direction.normalize();
          const velocity = direction.multiplyScalar(6.5); 

          const bodyDesc = this.RAPIER.RigidBodyDesc.dynamic()
            .setTranslation(pos.x, pos.y, pos.z)
            .setLinvel(velocity.x, velocity.y, velocity.z);
          const body = this.blendedWorld.createRigidBody(bodyDesc);
          const colDesc = this.RAPIER.ColliderDesc.ball(radius).setRestitution(0.75).setMass(0.6);
          this.blendedWorld.createCollider(colDesc, body);

          this.balls.push({ mesh, body, prevY: pos.y, spawnTime: performance.now(), scored: false });
        }

        update() {
          super.update();
          if (!this.RAPIER || !this.blendedWorld) return;

          const now = performance.now();
          for (let i = this.balls.length - 1; i >= 0; i--) {
            const ball = this.balls[i];
            const pos = ball.body.translation();
            const rot = ball.body.rotation();
            
            ball.mesh.position.set(pos.x, pos.y, pos.z);
            ball.mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);

            if (!ball.scored && ball.prevY > 2.0 && pos.y <= 2.0) {
              const dx = pos.x - 0;
              const dz = pos.z - (-2.5);
              const distSq = dx * dx + dz * dz;
              if (distSq < 0.28 * 0.28) { 
                ball.scored = true;
                this.score++;
                if (this.scoreText) this.scoreText.setText(`SCORE: ${this.score}`);
                ball.mesh.material.color.setHex(0xffff00); 
              }
            }
            ball.prevY = pos.y;

            if (now - ball.spawnTime > 5000) {
              this.remove(ball.mesh);
              this.blendedWorld.removeRigidBody(ball.body);
              this.balls.splice(i, 1);
            }
          }
        }
      }

      // アプリケーションの初期化
      async function startApp() {
        const options = new xb.Options();
        options.enableUI();
        options.enableHands();
        options.physics.RAPIER = RAPIER;
        options.setAppTitle('Hoop Shoot Game');

        // HoopGameをエンジンに追加
        xb.add(new HoopGame());
        
        // メインコンテナを指定して初期化
        await xb.init(options, document.getElementById('app'));
      }

      startApp();
    </script>
  </body>
</html>
